<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Registration — UniPortal</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js" defer></script>
</head>

<body>
    <div class="page-center" style="padding:60px 24px;">
        <div class="auth-card card-md">
            <div class="auth-logo">
                <div class="icon" style="background:linear-gradient(135deg,#6366f1,#4f46e5);">👨‍🏫</div>
                <h2>Create Faculty Account</h2>
                <p>Register your professional profile</p>
            </div>

            <div id="alertBox" class="alert alert-error alert-hidden" role="alert"></div>

            <form id="registerForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="full_name">Full Name <span class="required">*</span></label>
                        <input type="text" id="full_name" class="form-control" placeholder="Dr. Sarah Ahmed" required>
                    </div>
                    <div class="form-group">
                        <label for="employee_id">Employee ID <span class="required">*</span></label>
                        <input type="text" id="employee_id" class="form-control" placeholder="FAC-2024-001" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" class="form-control" placeholder="sarah@university.edu" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Department <span class="required">*</span></label>
                        <input type="text" id="department" class="form-control" placeholder="Computer Science" required>
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation <span class="required">*</span></label>
                        <select id="designation" class="form-control" required>
                            <option value="">Select designation…</option>
                            <option>Lecturer</option>
                            <option>Assistant Professor</option>
                            <option>Associate Professor</option>
                            <option>Professor</option>
                            <option>Visiting Lecturer</option>
                            <option>Lab Engineer</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="office_number">Office Number</label>
                        <input type="text" id="office_number" class="form-control" placeholder="Block A, Room 201">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+92 300 0000000">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary"
                    style="margin-top:8px;background:linear-gradient(135deg,#6366f1,#4f46e5);">
                    Create Faculty Account
                </button>
            </form>

            <div class="divider">or</div>
            <div class="text-center">
                <p class="text-muted">Already have an account?
                    <a href="faculty-login.html" style="font-weight:600;color:#6366f1;">Access portal here</a>
                </p>
                <p class="text-muted mt-4">
                    <a href="index.html" style="color:#94a3b8;">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        function showAlert(msg) {
            const box = document.getElementById('alertBox');
            box.className = 'alert alert-error';
            box.textContent = msg;
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.className = `show toast-${type}`;
            t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
            setTimeout(() => { t.className = ''; }, 3500);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('alertBox').className = 'alert alert-error alert-hidden';

            const full_name = document.getElementById('full_name').value.trim();
            const employee_id = document.getElementById('employee_id').value.trim();
            const email = document.getElementById('email').value.trim();
            const department = document.getElementById('department').value.trim();
            const designation = document.getElementById('designation').value;
            const office_number = document.getElementById('office_number').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!full_name || !employee_id || !email || !department || !designation) {
                showAlert('Please fill in all required fields.'); return;
            }
            const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRx.test(email)) {
                showAlert('Please enter a valid email address.'); return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account…';

            const res = await FacultyAPI.register({
                employee_id, full_name, email, department, designation, office_number, phone
            });

            if (!res) return;

            if (res.ok) {
                showToast('Account created! Redirecting to login…');
                setTimeout(() => window.location.href = 'faculty-login.html', 1800);
            } else {
                showAlert(res.data.error || 'Registration failed. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Create Faculty Account';
            }
        });
    </script>
</body>

</html>
