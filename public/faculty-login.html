<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login — UniPortal</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
</head>

<body>
    <div class="page-center">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="icon">👨‍🏫</div>
                <h2>Faculty Login</h2>
                <p>Sign in to your Faculty Portal</p>
            </div>

            <div id="alertBox" class="alert alert-error alert-hidden" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="employee_id">Employee ID <span class="required">*</span></label>
                    <input type="text" id="employee_id" name="employee_id" class="form-control"
                        placeholder="FAC-2024-001" required>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary"
                    style="margin-top:8px;background:linear-gradient(135deg,#6366f1,#4f46e5);">
                    Access Faculty Portal
                </button>
            </form>

            <div class="divider">or</div>
            <div class="text-center">
                <p class="text-muted">Don't have an account?
                    <a href="faculty-register.html" style="font-weight:600;color:#6366f1;">Register here</a>
                </p>
                <p class="text-muted mt-4">
                    <a href="index.html" style="color:#94a3b8;">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        if (Auth.isLoggedIn() && Auth.getRole() === 'faculty') {
            window.location.href = 'faculty-dashboard.html';
        }

        function showAlert(msg) {
            const box = document.getElementById('alertBox');
            box.className = 'alert alert-error';
            box.textContent = msg;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('alertBox').className = 'alert alert-error alert-hidden';

            const employee_id = document.getElementById('employee_id').value.trim();
            if (!employee_id) { showAlert('Please enter your Employee ID.'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Accessing portal…';

            const res = await FacultyAPI.login({ employee_id });
            if (!res) return;

            if (res.ok) {
                Auth.setUserId(res.data.employee_id);
                Auth.setRole('faculty');
                window.location.href = 'faculty-dashboard.html';
            } else {
                showAlert(res.data.error || 'Access failed. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Access Faculty Portal';
            }
        });
    </script>
</body>

</html>
